<section>
  <div class="fbox-row-space-between width-100">
    <img src="assets/img/logo_purple.svg" alt="PollApp Logo" />
    <button class="btn btn--primary">Create survey</button>
  </div>
  <div class="fbox-row gap-42px">
    <div class="survey">
      <div class="status status--secondary">Published</div>
      <div class="survey__date-category-wrap survey__text">
        <span>Ends on 01.09.2025</span>
        <span>Category: Team events</span>
      </div>
      <h2 class="survey__headline">Let's Plan the Next Team Event Together</h2>
      <div class="survey__text">
        We want to create a team activity that everyone will enjoy - share your preferences and
        ideas in our survey to help us plan better experiences together.
      </div>
    </div>
    <div class="results"></div>
  </div>
</section>
